<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Fly Photo Curator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1014; color: #eee;
  min-height: 100dvh; display: flex; flex-direction: column;
  align-items: center; padding: 16px 12px 24px;
  overscroll-behavior: none;
}

#header {
  width: 100%; max-width: 600px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
#progress { font-size: 13px; color: #4a5260; letter-spacing: .03em; }
#skip {
  background: none; border: 1px solid #1e252e; color: #4a5260;
  padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px;
  touch-action: manipulation;
}
#skip:active { background: #1a1f26; }

#fly-name {
  font-size: clamp(20px, 5vw, 26px); font-weight: 700; color: #fff;
  text-align: center; margin-bottom: 3px; text-wrap: balance;
  max-width: 600px; width: 100%;
}
#fly-id { font-size: 11px; color: #2e3844; text-align: center; margin-bottom: 14px; font-family: monospace; }

#grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  width: 100%; max-width: 600px;
}

.thumb {
  aspect-ratio: 4/3; background: #111620; border-radius: 8px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; position: relative;
  touch-action: manipulation;
  transition: border-color .12s;
}
.thumb:active { opacity: .8; }
.thumb.selected { border-color: #22c55e; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb .spin {
  width: 22px; height: 22px;
  border: 2.5px solid #1a1f28; border-top-color: #3a8ef5;
  border-radius: 50%; animation: spin .7s linear infinite;
}
.thumb.empty { cursor: default; }
.badge {
  position: absolute; bottom: 3px; right: 4px;
  font-size: 8px; font-weight: 700; padding: 1px 4px;
  border-radius: 3px; opacity: .8; pointer-events: none;
  font-family: monospace; letter-spacing: .04em;
}
.badge-w { background: #0f2d52; color: #5ba3d9; }
.badge-p { background: #1a2e10; color: #6abf47; }

@keyframes spin { to { transform: rotate(360deg); } }

#status {
  font-size: 12px; color: #2e3844; text-align: center;
  margin-top: 10px; min-height: 18px; width: 100%; max-width: 600px;
}

/* Done screen */
#done { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding-top: 20px; }
#done h2 { color: #3a8ef5; font-size: 22px; margin-bottom: 8px; }
#done p  { color: #4a5260; font-size: 13px; margin-bottom: 16px; text-align: center; }
#json-out {
  width: 100%; height: 240px;
  background: #0a0d11; color: #4cf; border: 1px solid #1a1f28;
  padding: 12px; font-size: 11px; border-radius: 10px; font-family: monospace;
  -webkit-user-select: all; user-select: all;
}
#copy-btn {
  margin-top: 12px; padding: 14px 32px;
  background: #1a5ed4; color: #fff; border: none;
  border-radius: 24px; cursor: pointer; font-size: 15px; font-weight: 600;
  touch-action: manipulation; width: 100%;
}
#copy-btn:active { background: #1248a8; }
#done-note { font-size: 11px; color: #2e3844; margin-top: 10px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div id="header">
  <div id="progress"></div>
  <button id="skip">Überspringen →</button>
</div>
<div id="fly-name"></div>
<div id="fly-id"></div>
<div id="grid"></div>
<div id="status"></div>
<div id="done">
  <h2>✓ Fertig!</h2>
  <p>Diesen JSON bei Claude einfügen:</p>
  <textarea id="json-out" readonly></textarea>
  <button id="copy-btn">📋 Kopieren &amp; bei Claude einfügen</button>
  <div id="done-note">Alles markieren → kopieren → neues Claude-Fenster → einfügen</div>
</div>

  ['waltsworm',      "Walt's Worm",              "Walt's Worm nymph fly fishing"],
  ['wd40',           'WD-40 Midge',              'WD-40 midge nymph fly fishing'],
  ['woolly',         'Woolly Bugger',            'Woolly Bugger fly fishing'],
  ['woolyworm',      'Wooly Worm',               'Wooly Worm wet fly fishing'],
  ['wulff',          'Royal Wulff',              'Royal Wulff fly fishing'],
  ['xcaddis',        'X-Caddis',                 'X-Caddis dry fly fishing'],
  ['yellowsally',    'Yellow Sally',             'Yellow Sally stonefly fly'],
  ['zebra',          'Zebra Midge',              'Zebra Midge nymph fly fishing'],
  ['zonker',         'Zonker',                   'Zonker streamer fly fishing'],

const mapping = {};
let idx = 0;
let nextCache = null;

function thumbUrl(raw) {
  const url = raw.startsWith('//') ? 'https:' + raw : raw;
  return url.replace(/\/\d+px-/, '/800px-');
}

// Returns true if filename contains any word from the fly name (>2 chars)
function filenameMatchesFly(url, flyName) {
  try {
    const parts = decodeURIComponent(url).split('/');
    const filename = parts[parts.length - 1].toLowerCase().replace(/[_\-+]/g, ' ');
    const words = flyName.toLowerCase().split(' ').filter(w => w.length > 2);
    return words.some(w => filename.includes(w));
  } catch(e) { return false; }
}

// Hard rejects only: clearly not a fly pattern at all
const HARD_SKIP = ['fisherman','angler','portrait','landscape','diagram',' map ','trichoptera','ephemeroptera'];
function notHardSkip(url) {
  try {
    const filename = decodeURIComponent(url).split('/').pop().toLowerCase();
    return !HARD_SKIP.some(b => filename.includes(b));
  } catch(e) { return true; }
}

async function wpRestSearch(flyName, query) {
  const r = await fetch('https://en.wikipedia.org/w/rest.php/v1/search/page?q=' +
    encodeURIComponent(query) + '&limit=12');
  const data = await r.json();
  const pages = (data.pages || []).filter(p => p.thumbnail?.url);
  const nameWords = flyName.toLowerCase().split(' ').filter(w => w.length > 2);
  // Prefer articles whose title contains a fly name word; fall back to all
  const strict = pages.filter(p => nameWords.some(w => p.title.toLowerCase().includes(w)));
  const source = strict.length > 0 ? strict : pages;
  return source.map(p => ({ url: thumbUrl(p.thumbnail.url), src: 'WP' }));
}

async function commonsRestSearch(flyName, query) {
  const r = await fetch('https://commons.wikimedia.org/w/rest.php/v1/search/page?q=' +
    encodeURIComponent(query) + '&limit=12');
  const data = await r.json();
  const all = (data.pages || [])
    .filter(p => p.thumbnail?.url)
    .map(p => ({ url: thumbUrl(p.thumbnail.url), src: 'WC' }));
  // Prefer images whose filename matches fly name; fall back to hard-skip-only filter
  const strict = all.filter(x => filenameMatchesFly(x.url, flyName));
  return strict.length > 0 ? strict : all.filter(x => notHardSkip(x.url));
}

async function loadImages([id, name, query]) {
  const [r1, r2, r3, r4] = await Promise.allSettled([
    wpRestSearch(name, name + ' fly fishing'),
    wpRestSearch(name, name + ' fly pattern'),
    commonsRestSearch(name, query),
    commonsRestSearch(name, name + ' fly tying'),
  ]);
  const all = [r1, r2, r3, r4]
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value);
  const seen = new Set();
  return all.filter(x => x.url && !seen.has(x.url) && seen.add(x.url)).slice(0, 9);
}

function showLoading() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    d.className = 'thumb';
    const s = document.createElement('div'); s.className = 'spin';
    d.appendChild(s);
    grid.appendChild(d);
  }
}

function renderGrid(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('status').textContent =
    items.length === 0 ? 'Keine Fotos gefunden — bitte überspringen' : '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    if (i < items.length) {
      d.className = 'thumb';
      const img = document.createElement('img');
      img.src = items[i].url;
      img.loading = 'lazy';
      img.onerror = () => { d.className = 'thumb empty'; d.innerHTML = ''; };
      const badge = document.createElement('div');
      badge.className = 'badge badge-' + (items[i].src === 'WP' ? 'p' : 'w');
      badge.textContent = items[i].src === 'WP' ? 'Wikipedia' : 'Commons';
      d.appendChild(img);
      d.appendChild(badge);
      const url = items[i].url;
      d.onclick = () => pick(url, d);
    } else {
      d.className = 'thumb empty';
    }
    grid.appendChild(d);
  }
}

function pick(url, el) {
  mapping[FLIES[idx][0]] = url;
  el.classList.add('selected');
  setTimeout(() => { idx++; loadFly(); }, 260);
}

async function loadFly() {
  if (idx >= FLIES.length) { showDone(); return; }
  const fly = FLIES[idx];
  document.getElementById('progress').textContent = `${idx + 1} / ${FLIES.length}`;
  document.getElementById('fly-name').textContent = fly[1];
  document.getElementById('fly-id').textContent = fly[0];
  document.getElementById('status').textContent = '';
  showLoading();

  let items;
  if (nextCache) {
    items = await nextCache;
    nextCache = null;
  } else {
    items = await loadImages(fly).catch(() => []);
  }
  renderGrid(items);
  if (idx + 1 < FLIES.length) nextCache = loadImages(FLIES[idx + 1]).catch(() => []);
}

document.getElementById('skip').onclick = () => { idx++; loadFly(); };

function showDone() {
  document.getElementById('header').style.display = 'none';
  document.getElementById('fly-name').style.display = 'none';
  document.getElementById('fly-id').style.display = 'none';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('done').style.display = 'flex';
  document.getElementById('json-out').value = JSON.stringify(mapping, null, 2);
}

document.getElementById('copy-btn').onclick = () => {
  const ta = document.getElementById('json-out');
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  if (navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(() => {});
  document.getElementById('copy-btn').textContent = '✓ Kopiert!';
};

loadFly();
</script>
